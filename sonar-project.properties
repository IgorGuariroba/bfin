sonar.projectKey=IgorGuariroba_bfin
sonar.organization=igorguariroba

sonar.sources=src
sonar.tests=tests
sonar.exclusions=dist/**,node_modules/**,drizzle/**

# Integration-only files: exercised by integration/E2E tests against real
# external systems (Redis, Auth0 JWKS) rather than unit tests. Excluding
# them from coverage avoids forcing network-dependent unit tests.
sonar.coverage.exclusions=src/mcp/session-store-redis.ts,src/lib/oidc-jwks.ts,src/plugins/oidc.ts,src/mcp/server.ts
sonar.test.exclusions=tests/**
sonar.test.inclusions=tests/**/*.test.ts

sonar.javascript.lcov.reportPaths=coverage/lcov/lcov.info
sonar.sourceEncoding=UTF-8
