name: Gemini re-review on push

on:
  pull_request:
    types: [synchronize]

permissions:
  pull-requests: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Comment /gemini review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body "/gemini review" --repo ${{ github.repository }}
