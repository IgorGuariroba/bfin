name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [master]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: build-push-deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/bfin
      SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set lowercase image name
        run: echo "IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ env.SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          envs: IMAGE,SHA
          script: |
            set -e
            cd /opt/bfin/app
            PREV_SHA=$(git rev-parse HEAD)
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            export IMAGE_TAG="$SHA"
            docker compose -f docker-compose.vps.yml --env-file /opt/bfin/.env pull api
            docker compose -f docker-compose.vps.yml --env-file /opt/bfin/.env up -d
            if ! git diff --quiet "$PREV_SHA" HEAD -- caddy/Caddyfile; then
              docker compose -f docker-compose.vps.yml --env-file /opt/bfin/.env exec -T caddy caddy reload --config /etc/caddy/Caddyfile
            fi
            docker image prune -f
            docker compose -f docker-compose.vps.yml ps
