name: deploy

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [master]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: build-push-deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/bfin
      SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set lowercase image name
        run: echo "IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ env.SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          envs: IMAGE,SHA
          script: |
            set -e
            cd /opt/bfin/app
            PREV_SHA=$(git rev-parse HEAD)
            git fetch origin master
            git checkout master
            git reset --hard origin/master
            export IMAGE_TAG="$SHA"
            docker compose -f docker-compose.vps.yml --env-file /opt/bfin/.env pull api
            docker compose -f docker-compose.vps.yml --env-file /opt/bfin/.env up -d
            if ! git diff --quiet "$PREV_SHA" HEAD -- caddy/Caddyfile; then
              docker compose -f docker-compose.vps.yml --env-file /opt/bfin/.env restart caddy
            fi

            echo "Waiting for API to be ready..."
            # Wait up to 60 seconds for health check (12 * 5s)
            for i in $(seq 1 12); do
              if docker compose -f docker-compose.vps.yml exec -T api node -e "fetch('http://127.0.0.1:3000/health/ready').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" 2>/dev/null; then
                echo "API is ready!"
                break
              fi
              echo "Waiting... ($i)"
              sleep 5
              if [ $i -eq 12 ]; then
                echo "API failed to become ready in time"
                docker compose -f docker-compose.vps.yml logs api
                exit 1
              fi
            done

            docker image prune -f
            docker compose -f docker-compose.vps.yml ps

      - name: Install Hurl
        run: |
          curl --location --remote-name https://github.com/Orange-OpenSource/hurl/releases/download/6.0.0/hurl_6.0.0_amd64.deb
          sudo apt-get update && sudo apt-get install ./hurl_6.0.0_amd64.deb

      - name: Run Smoke Tests
        run: |
          hurl --variable host=https://api.bfincont.com.br --test --retry 5 scripts/smoke-test.hurl
