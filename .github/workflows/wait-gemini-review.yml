name: wait-gemini-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  pull-requests: read

jobs:
  gemini-review:
    name: gemini-review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 15
    steps:
      - name: Wait for Gemini review on current HEAD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          echo "Waiting for gemini-code-assist[bot] review on SHA $SHA (PR #$PR)"
          for i in $(seq 1 60); do
            count=$(gh api "repos/$REPO/pulls/$PR/reviews" \
              --jq "[.[] | select(.user.login==\"gemini-code-assist[bot]\" and .commit_id==\"$SHA\")] | length")
            if [ "$count" -gt 0 ]; then
              echo "Gemini reviewed SHA $SHA"
              exit 0
            fi
            echo "still waiting... ($i/60)"
            sleep 15
          done
          echo "Timeout: no Gemini review for $SHA after 15 minutes"
          exit 1
