name: Setup Node.js and install dependencies
description: >
  Configure Node 22 with npm cache and run `npm ci`. Callers must run
  `actions/checkout` before invoking this action (GitHub requires the repo on
  disk to resolve locally-referenced composite actions).

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci
