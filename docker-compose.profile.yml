services:
  api:
    build:
      context: .
      target: profile
    user: node
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - OIDC_AUDIENCE=${OIDC_AUDIENCE:-}
      - CLINIC_TOOL=${CLINIC_TOOL:-doctor}
      - NO_INSIGHT=1
      - NO_UPDATE_NOTIFIER=1
    depends_on:
      db:
        condition: service_healthy
    command: >-
      sh -c 'mkdir -p /app/.clinic/work && cd /app/.clinic/work && ln -sfn /app/src src && ln -sfn /app/dist dist && ln -sfn /app/node_modules node_modules && exec node /app/node_modules/.bin/clinic $${CLINIC_TOOL} --dest /app/.clinic -- node /app/dist/server.js'
    init: true
    stop_signal: SIGINT
    stop_grace_period: 60s
    restart: "no"
    volumes:
      - .clinic:/app/.clinic
    mem_limit: 512m
    cpus: 1.0
    read_only: false
    networks:
      - backend
